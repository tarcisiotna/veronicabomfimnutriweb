<!DOCTYPE html>
<html>
<head>
  <title>Teste Visual - Verônica Bomfim</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body style="padding: 40px;">
  <h2>Teste das Melhorias Visuais</h2>
  
  <div style="margin: 30px 0;">
    <h3>Botões</h3>
    <a href="#" class="btn-primario">Botão Primário</a>
    <a href="#" class="btn-secundario" style="margin-left: 15px;">Botão Secundário</a>
  </div>
  
  <div style="margin: 30px 0;">
    <h3>Cards</h3>
    <div class="servico-card" style="background: white; padding: 20px; border-radius: 8px; margin: 10px; max-width: 300px;">
      <h4>Card de Exemplo</h4>
      <p>Este é um card de teste para ver o hover effect.</p>
    </div>
  </div>
  
  <div style="margin: 30px 0;">
    <h3>Foto (simulação)</h3>
    <div class="hero-img-container" style="margin: 20px;">
      <div style="width: 100%; height: 100%; background: #ddd; display: flex; align-items: center; justify-content: center;">
        Foto
      </div>
    </div>
  </div>
  
  <script>
    // Simular carregamento de imagem
    setTimeout(() => {
      document.querySelector('.hero-img-container div').style.background = 'linear-gradient(45deg, #394233, #8fa888)';
      document.querySelector('.hero-img-container div').style.color = 'white';
    }, 500);
  </script>
</body>
</html>
